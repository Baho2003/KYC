services:
  - type: web
    name: kyc
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: YUZID_API_BASE_URL
        value: https://api.yuzid.uz
      - key: YUZID_LOGIN
        sync: false
      - key: YUZID_PASSWORD
        sync: false
